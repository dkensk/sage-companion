<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="leafLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="leafDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Sage sprig — botanical branch with paired oval leaves -->
  <g transform="translate(256,260)">
    <!-- Main stem -->
    <path d="M0,130 C5,80 -5,0 0,-140" stroke="#16A34A" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Top leaf (single) -->
    <ellipse cx="0" cy="-148" rx="28" ry="45" fill="url(#leafLight)" transform="rotate(-5,0,-148)"/>
    <line x1="0" y1="-180" x2="0" y2="-115" stroke="#16A34A" stroke-width="1.5" opacity="0.6"/>
    <!-- Pair 1 (upper) -->
    <ellipse cx="-48" cy="-95" rx="26" ry="42" fill="url(#leafLight)" transform="rotate(-30,-48,-95)"/>
    <line x1="-35" y1="-125" x2="-58" y2="-72" stroke="#16A34A" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="48" cy="-100" rx="26" ry="42" fill="url(#leafDark)" transform="rotate(30,48,-100)"/>
    <line x1="35" y1="-130" x2="58" y2="-77" stroke="#16A34A" stroke-width="1.5" opacity="0.5"/>
    <!-- Pair 2 (middle) -->
    <ellipse cx="-55" cy="-20" rx="28" ry="44" fill="url(#leafDark)" transform="rotate(-40,-55,-20)"/>
    <line x1="-38" y1="-52" x2="-68" y2="5" stroke="#16A34A" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="55" cy="-25" rx="28" ry="44" fill="url(#leafLight)" transform="rotate(40,55,-25)"/>
    <line x1="38" y1="-57" x2="68" y2="0" stroke="#16A34A" stroke-width="1.5" opacity="0.5"/>
    <!-- Pair 3 (lower) -->
    <ellipse cx="-50" cy="58" rx="26" ry="40" fill="url(#leafLight)" transform="rotate(-45,-50,58)"/>
    <line x1="-34" y1="28" x2="-62" y2="82" stroke="#16A34A" stroke-width="1.5" opacity="0.5"/>
    <ellipse cx="50" cy="55" rx="26" ry="40" fill="url(#leafDark)" transform="rotate(45,50,55)"/>
    <line x1="34" y1="25" x2="62" y2="79" stroke="#16A34A" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
