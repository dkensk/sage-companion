<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Sage leaf icon -->
  <g transform="translate(256,180)" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main leaf shape -->
    <path d="M0,0 C-60,-30 -80,-100 -10,-140 C30,-120 50,-60 0,0Z" fill="rgba(255,255,255,0.2)" stroke="white"/>
    <path d="M0,0 C60,-30 80,-100 10,-140 C-30,-120 -50,-60 0,0Z" fill="rgba(255,255,255,0.2)" stroke="white"/>
    <!-- Stem -->
    <line x1="0" y1="0" x2="0" y2="40"/>
    <!-- Center vein -->
    <line x1="0" y1="-10" x2="0" y2="-110"/>
  </g>
  <!-- "Sage" text -->
  <text x="256" y="330" font-size="100" font-weight="700" text-anchor="middle" fill="white" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" letter-spacing="4">Sage</text>
</svg>
