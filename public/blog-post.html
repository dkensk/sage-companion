<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sage Companion Blog">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1E3A8A">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <title>Blog — Sage Companion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #1E3A8A; --navy-dark: #0F172A; --navy-lt: #2D4EAA;
      --teal: #0F766E; --teal-lt: #14B8A6;
      --bg: #F8FAFC; --bg2: #F1F5F9; --white: #FFFFFF;
      --text: #0F172A; --muted: #64748B; --border: #E2E8F0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
      --radius: 20px;
      --ease: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    html { scroll-behavior: smooth; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between;
      background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
    .nav-logo-icon { font-size: 26px; }
    .nav-logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .nav-link { color: rgba(255,255,255,0.7); font-size: 14px; font-weight: 600; text-decoration: none; padding: 8px 14px; border-radius: 10px; transition: color 0.15s, background 0.15s; }
    .nav-link:hover { color: white; background: rgba(255,255,255,0.08); }
    .nav-cta { background: white; color: var(--navy); font-size: 14px; font-weight: 700; padding: 9px 18px; border-radius: 10px; text-decoration: none; }

    /* Post Hero */
    .post-hero {
      padding: 120px 24px 64px; text-align: center; position: relative; overflow: hidden;
    }
    .post-hero::before {
      content: ''; position: absolute; inset: 0;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 56px 56px; pointer-events: none;
    }
    .post-hero-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
    .post-back {
      display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.6);
      text-decoration: none; font-size: 14px; font-weight: 600; margin-bottom: 24px;
      transition: color 0.2s;
    }
    .post-back:hover { color: white; }
    .post-emoji { font-size: 56px; margin-bottom: 20px; }
    .post-tag {
      display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 5px 14px; border-radius: 8px;
      background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); margin-bottom: 16px;
    }
    .post-hero h1 {
      font-size: clamp(28px, 4.5vw, 44px); font-weight: 900; color: white;
      letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 16px;
    }
    .post-hero-date { font-size: 14px; color: rgba(255,255,255,0.5); }

    /* Article */
    .article-container { max-width: 720px; margin: 0 auto; padding: 56px 24px 96px; }
    .article-body { font-size: 17px; line-height: 1.8; color: #334155; }
    .article-body h2 { font-size: 26px; font-weight: 800; color: var(--text); margin: 40px 0 16px; letter-spacing: -0.02em; }
    .article-body h3 { font-size: 20px; font-weight: 700; color: var(--text); margin: 32px 0 12px; }
    .article-body p { margin-bottom: 20px; }
    .article-body ul, .article-body ol { margin: 16px 0 20px 24px; }
    .article-body li { margin-bottom: 8px; }
    .article-body blockquote {
      border-left: 4px solid var(--teal); padding: 16px 24px; margin: 24px 0;
      background: var(--bg2); border-radius: 0 12px 12px 0; font-style: italic; color: var(--muted);
    }
    .article-body a { color: var(--navy); font-weight: 600; text-decoration: underline; }
    .article-body strong { color: var(--text); }

    /* CTA Banner */
    .article-cta {
      background: linear-gradient(135deg, var(--navy), var(--teal));
      border-radius: var(--radius); padding: 40px; text-align: center; margin-top: 48px;
    }
    .article-cta h3 { font-size: 24px; font-weight: 800; color: white; margin-bottom: 8px; }
    .article-cta p { font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    .article-cta-btn {
      display: inline-block; background: white; color: var(--navy); font-size: 16px; font-weight: 700;
      padding: 14px 32px; border-radius: 12px; text-decoration: none; transition: transform 0.15s;
    }
    .article-cta-btn:hover { transform: translateY(-2px); }

    /* Related */
    .related-section { max-width: 960px; margin: 0 auto; padding: 0 24px 96px; }
    .related-title { font-size: 24px; font-weight: 800; color: var(--text); margin-bottom: 28px; text-align: center; }
    .related-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; }
    .related-card {
      background: white; border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
      box-shadow: var(--shadow-sm); text-decoration: none; color: inherit;
      transition: transform 0.2s var(--ease), box-shadow 0.2s var(--ease);
    }
    .related-card:hover { transform: translateY(-3px); box-shadow: 0 4px 20px rgba(0,0,0,0.09); }
    .related-card-img { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; }
    .related-card-body { padding: 16px; }
    .related-card-title { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.35; }

    .loading { text-align: center; padding: 200px 24px; color: var(--muted); font-size: 16px; }

    /* Footer */
    footer { background: var(--navy-dark); color: rgba(255,255,255,0.5); padding: 40px 24px; }
    .footer-inner { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .footer-brand { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,0.8); font-weight: 700; font-size: 15px; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px; }
    .footer-links a:hover { color: rgba(255,255,255,0.8); }
    .footer-copy { font-size: 13px; width: 100%; text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.07); }

    @media (max-width: 860px) { .related-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) {
      .related-grid { grid-template-columns: 1fr; }
      .nav-link { display: none; }
      .footer-inner { flex-direction: column; align-items: center; text-align: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><span class="nav-logo-icon">🌿</span><span class="nav-logo-text">Sage Companion</span></a>
  <div class="nav-links">
    <a href="/#features" class="nav-link">Features</a>
    <a href="/blog" class="nav-link">Blog</a>
    <a href="/setup" class="nav-cta">Get Started</a>
  </div>
</nav>

<div id="postContent">
  <div class="loading">Loading article...</div>
</div>

<footer>
  <div class="footer-inner">
    <div class="footer-brand"><span>🌿</span><span>Sage Companion LLC</span></div>
    <div class="footer-links">
      <a href="/#features">Features</a>
      <a href="/blog">Blog</a>
      <a href="/help">Help & Support</a>
      <a href="/privacy">Privacy Policy</a>
    </div>
  </div>
  <div class="footer-copy">© 2026 Sage Companion LLC · Built with care · Privacy-first</div>
</footer>

<script>
async function loadPost() {
  const slug = window.location.pathname.replace("/blog/", "").replace(/\/$/, "");
  if (!slug) return window.location.href = "/blog";

  try {
    const res = await fetch("/api/blog/" + encodeURIComponent(slug));
    if (!res.ok) {
      document.getElementById("postContent").innerHTML = '<div class="loading">Article not found. <a href="/blog" style="color:var(--navy);">Back to blog</a></div>';
      return;
    }
    const post = await res.json();
    document.title = post.title + " — Sage Companion Blog";

    const date = new Date(post.created_at).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" });

    document.getElementById("postContent").innerHTML = `
      <section class="post-hero" style="background: linear-gradient(160deg, ${post.color_from || '#0F172A'}, ${post.color_to || '#1E3A8A'});">
        <div class="post-hero-inner">
          <a href="/blog" class="post-back">← Back to blog</a>
          <div class="post-emoji">${post.emoji || '📝'}</div>
          <div class="post-tag">${post.category || 'General'}</div>
          <h1>${post.title}</h1>
          <div class="post-hero-date">${date}</div>
        </div>
      </section>
      <article class="article-container">
        <div class="article-body">${post.content}</div>
        <div class="article-cta">
          <h3>Ready to try Sage Companion?</h3>
          <p>Set up takes less than two minutes. No credit card required.</p>
          <a href="/setup" class="article-cta-btn">Get Started Free →</a>
        </div>
      </article>
      <div class="related-section" id="relatedSection"></div>
    `;

    // Load related posts
    loadRelated(post.slug, post.category);
  } catch (e) {
    document.getElementById("postContent").innerHTML = '<div class="loading">Failed to load article. <a href="/blog" style="color:var(--navy);">Back to blog</a></div>';
  }
}

async function loadRelated(currentSlug, category) {
  try {
    const res = await fetch("/api/blog");
    const posts = await res.json();
    const related = posts.filter(p => p.slug !== currentSlug).slice(0, 3);
    if (related.length === 0) return;

    document.getElementById("relatedSection").innerHTML = `
      <h3 class="related-title">More from the blog</h3>
      <div class="related-grid">
        ${related.map(p => `
          <a class="related-card" href="/blog/${p.slug}">
            <div class="related-card-img" style="background: linear-gradient(135deg, ${p.color_from}, ${p.color_to});">${p.emoji}</div>
            <div class="related-card-body">
              <div class="related-card-title">${p.title}</div>
            </div>
          </a>
        `).join("")}
      </div>
    `;
  } catch (e) {}
}

loadPost();
</script>
</body>
</html>
