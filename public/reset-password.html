<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Your Password - Sage Companion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(160deg, #EEF2FF 0%, #F0FDF4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-size: 48px;
            text-align: center;
            margin-bottom: 24px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: #1E3A8A;
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.2;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 18px;
            font-weight: 600;
            color: #1E3A8A;
            margin-bottom: 10px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 20px;
            border: 2.5px solid #E2E8F0;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #0F766E;
        }

        input[type="password"]::placeholder,
        input[type="text"]::placeholder {
            color: #94A3B8;
        }

        .error-message {
            background-color: #FEE2E2;
            color: #991B1B;
            padding: 16px 18px;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 20px;
            border-left: 4px solid #DC2626;
            display: none;
            line-height: 1.5;
        }

        .error-message.visible {
            display: block;
        }

        .success-message {
            background-color: #DBEAFE;
            color: #003366;
            padding: 20px 18px;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 20px;
            border-left: 4px solid #0F766E;
            display: none;
            line-height: 1.5;
        }

        .success-message.visible {
            display: block;
        }

        .success-content {
            display: none;
        }

        .success-content.visible {
            display: block;
        }

        .form-content {
            display: block;
        }

        .form-content.hidden {
            display: none;
        }

        .invalid-link-message {
            background-color: #FEE2E2;
            color: #991B1B;
            padding: 20px 18px;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 20px;
            border-left: 4px solid #DC2626;
            display: none;
            line-height: 1.5;
        }

        .invalid-link-message.visible {
            display: block;
        }

        .button {
            width: 100%;
            border-radius: 16px;
            padding: 20px;
            font-size: 20px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
        }

        .button-primary {
            background-color: #0F766E;
            color: white;
        }

        .button-primary:hover:not(:disabled) {
            background-color: #0d5e5a;
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
        }

        .button-primary:active:not(:disabled) {
            transform: scale(0.98);
        }

        .button-primary:disabled {
            background-color: #CBD5E1;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .button-secondary {
            background-color: #16A34A;
            color: white;
        }

        .button-secondary:hover {
            background-color: #15803d;
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }

        .button-secondary:active {
            transform: scale(0.98);
        }

        .link {
            color: #0F766E;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .link:hover {
            color: #0d5e5a;
            text-decoration: underline;
        }

        .text-center {
            text-align: center;
            font-size: 18px;
            color: #334155;
            margin-top: 20px;
            line-height: 1.5;
        }

        .validation-error {
            color: #DC2626;
            font-size: 14px;
            margin-top: 6px;
            display: none;
        }

        .validation-error.visible {
            display: block;
        }

        .loading {
            display: inline-block;
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 20px;
                padding: 30px 24px;
            }

            .title {
                font-size: 28px;
                margin-bottom: 24px;
            }

            .button {
                font-size: 18px;
                padding: 18px;
            }

            label {
                font-size: 16px;
            }

            input[type="password"],
            input[type="text"] {
                font-size: 18px;
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Logo -->
            <div class="logo">🌿</div>

            <!-- Title -->
            <h1 class="title">Reset Your Password</h1>

            <!-- Invalid Link Message -->
            <div id="invalidLinkMessage" class="invalid-link-message">
                <p>This password reset link is invalid or has expired. Please request a new one.</p>
            </div>

            <!-- Form Content -->
            <div id="formContent" class="form-content">
                <!-- Error Message -->
                <div id="errorMessage" class="error-message">
                    <p id="errorText"></p>
                </div>

                <!-- Form -->
                <form id="resetPasswordForm">
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input
                            type="password"
                            id="newPassword"
                            placeholder="Enter your new password"
                            required
                            autocomplete="new-password"
                        >
                        <div id="passwordError" class="validation-error">
                            Password must be at least 6 characters
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm your new password"
                            required
                            autocomplete="new-password"
                        >
                        <div id="confirmError" class="validation-error">
                            Passwords do not match
                        </div>
                    </div>

                    <button type="submit" id="submitButton" class="button button-primary">
                        Reset Password
                    </button>
                </form>
            </div>

            <!-- Success Content -->
            <div id="successContent" class="success-content">
                <div class="success-message visible">
                    <p>Your password has been successfully reset!</p>
                </div>
                <div class="text-center">
                    <p>You can now sign in with your new password.</p>
                </div>
                <button onclick="window.location.href='/setup'" class="button button-secondary">
                    Sign In
                </button>
            </div>

            <!-- Back to Sign In Link (for invalid token) -->
            <div id="invalidLinkContent" style="display: none;">
                <div class="text-center">
                    <p>
                        <a href="/setup" class="link">Return to Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const invalidLinkMessage = document.getElementById('invalidLinkMessage');
        const invalidLinkContent = document.getElementById('invalidLinkContent');
        const formContent = document.getElementById('formContent');
        const successContent = document.getElementById('successContent');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const resetPasswordForm = document.getElementById('resetPasswordForm');
        const submitButton = document.getElementById('submitButton');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordError = document.getElementById('passwordError');
        const confirmError = document.getElementById('confirmError');

        // Check if token exists
        if (!token) {
            formContent.classList.add('hidden');
            successContent.style.display = 'none';
            invalidLinkMessage.classList.add('visible');
            invalidLinkContent.style.display = 'block';
        }

        // Real-time validation
        newPasswordInput.addEventListener('input', validatePasswords);
        confirmPasswordInput.addEventListener('input', validatePasswords);

        function validatePasswords() {
            const password = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            let isValid = true;

            // Check password length
            if (password.length < 6 && password.length > 0) {
                passwordError.classList.add('visible');
                isValid = false;
            } else {
                passwordError.classList.remove('visible');
            }

            // Check if passwords match
            if (password && confirmPassword && password !== confirmPassword) {
                confirmError.classList.add('visible');
                isValid = false;
            } else if (password === confirmPassword && password.length >= 6) {
                confirmError.classList.remove('visible');
            } else if (!confirmPassword) {
                confirmError.classList.remove('visible');
            }

            return isValid;
        }

        // Form submission
        resetPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validate
            if (!password || !confirmPassword) {
                showError('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (!token) {
                showError('Invalid reset link');
                return;
            }

            // Disable submit button
            submitButton.disabled = true;
            submitButton.textContent = 'Resetting...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        password: password,
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    // Show success message
                    formContent.classList.add('hidden');
                    errorMessage.classList.remove('visible');
                    successContent.style.display = 'block';
                } else {
                    // Show error message
                    showError(data.message || 'Failed to reset password. Please try again.');
                    submitButton.disabled = false;
                    submitButton.textContent = 'Reset Password';
                }
            } catch (error) {
                showError('An error occurred. Please try again.');
                submitButton.disabled = false;
                submitButton.textContent = 'Reset Password';
                console.error('[Auth] Reset password error:', error);
            }
        });

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('visible');
        }
    </script>
</body>
</html>
