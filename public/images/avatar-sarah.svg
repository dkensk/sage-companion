<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="sarahBg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#E8F5F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4E9E6;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="sarahSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D6C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8C4B0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sarahHair" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8935F;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="40" cy="40" r="40" fill="url(#sarahBg)"/>
  <circle cx="40" cy="40" r="38" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.6"/>

  <!-- Hair -->
  <ellipse cx="40" cy="25" rx="22" ry="24" fill="url(#sarahHair)"/>

  <!-- Head -->
  <circle cx="40" cy="42" r="18" fill="url(#sarahSkin)"/>

  <!-- Ears -->
  <ellipse cx="22" cy="42" rx="5.5" ry="8" fill="url(#sarahSkin)"/>
  <ellipse cx="58" cy="42" rx="5.5" ry="8" fill="url(#sarahSkin)"/>

  <!-- Eyes (warm, kind) -->
  <circle cx="34" cy="40" r="2" fill="#1E3A8A"/>
  <circle cx="46" cy="40" r="2" fill="#1E3A8A"/>

  <!-- Smile -->
  <path d="M 36 47 Q 40 49 44 47" stroke="#9B7E5C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Neck/shoulder area -->
  <ellipse cx="40" cy="60" rx="20" ry="16" fill="url(#sarahSkin)" opacity="0.7"/>

  <!-- Clothing (suggested top in teal) -->
  <ellipse cx="40" cy="68" rx="22" ry="18" fill="#14B8A6" opacity="0.7"/>

  <!-- Decorative detail -->
  <circle cx="40" cy="40" r="26" fill="none" stroke="#14B8A6" stroke-width="0.8" opacity="0.3" stroke-dasharray="2,3"/>
</svg>