<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mariaBg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#F0F9F8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F2F0;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="mariaSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D6C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8C4B0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="mariaHair" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#C4A9A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A89080;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="40" cy="40" r="40" fill="url(#mariaBg)"/>
  <circle cx="40" cy="40" r="38" fill="none" stroke="#14B8A6" stroke-width="1.5" opacity="0.5"/>

  <!-- Hair (longer, different style) -->
  <ellipse cx="40" cy="24" rx="21" ry="24" fill="url(#mariaHair)"/>
  <!-- Hair accent (longer side) -->
  <ellipse cx="18" cy="42" rx="8" ry="14" fill="url(#mariaHair)" opacity="0.8"/>

  <!-- Head -->
  <circle cx="40" cy="42" r="18" fill="url(#mariaSkin)"/>

  <!-- Ears -->
  <ellipse cx="22" cy="42" rx="5.5" ry="8" fill="url(#mariaSkin)"/>
  <ellipse cx="58" cy="42" rx="5.5" ry="8" fill="url(#mariaSkin)"/>

  <!-- Eyes (gentle) -->
  <circle cx="34" cy="40" r="2" fill="#1E3A8A"/>
  <circle cx="46" cy="40" r="2" fill="#1E3A8A"/>

  <!-- Smile (warm, serene) -->
  <path d="M 35 47 Q 40 49 45 47" stroke="#9B7E5C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Neck/shoulder area -->
  <ellipse cx="40" cy="60" rx="20" ry="16" fill="url(#mariaSkin)" opacity="0.7"/>

  <!-- Clothing (suggested top in warm earth tone) -->
  <ellipse cx="40" cy="68" rx="22" ry="18" fill="#D4A574" opacity="0.7"/>

  <!-- Decorative detail -->
  <circle cx="40" cy="40" r="26" fill="none" stroke="#D4A574" stroke-width="0.8" opacity="0.3" stroke-dasharray="2,3"/>
</svg>