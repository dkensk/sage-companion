<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="jamesBg" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#E0F2FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D0E8FA;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="jamesSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D6C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8C4B0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="jamesHair" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#8B7355;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B5645;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="40" cy="40" r="40" fill="url(#jamesBg)"/>
  <circle cx="40" cy="40" r="38" fill="none" stroke="#1E3A8A" stroke-width="1.5" opacity="0.5"/>

  <!-- Hair (slightly shorter/different style) -->
  <ellipse cx="40" cy="24" rx="20" ry="22" fill="url(#jamesHair)"/>

  <!-- Head -->
  <circle cx="40" cy="42" r="18" fill="url(#jamesSkin)"/>

  <!-- Ears -->
  <ellipse cx="22" cy="42" rx="5.5" ry="8" fill="url(#jamesSkin)"/>
  <ellipse cx="58" cy="42" rx="5.5" ry="8" fill="url(#jamesSkin)"/>

  <!-- Eyes (confident) -->
  <circle cx="34" cy="40" r="2.1" fill="#1E3A8A"/>
  <circle cx="46" cy="40" r="2.1" fill="#1E3A8A"/>

  <!-- Smile -->
  <path d="M 35 47 Q 40 49 45 47" stroke="#9B7E5C" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Neck/shoulder area -->
  <ellipse cx="40" cy="60" rx="20" ry="16" fill="url(#jamesSkin)" opacity="0.7"/>

  <!-- Clothing (suggested top in navy) -->
  <ellipse cx="40" cy="68" rx="22" ry="18" fill="#1E3A8A" opacity="0.7"/>

  <!-- Decorative detail -->
  <circle cx="40" cy="40" r="26" fill="none" stroke="#1E3A8A" stroke-width="0.8" opacity="0.3" stroke-dasharray="2,3"/>
</svg>